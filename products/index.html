<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>Products · Chengda</title>
<meta name="viewport" content="width=device-width, initial-scale=1" />
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/assets/porcelain.css?v=1" />
<style>
  .layout { display: grid; grid-template-columns: 260px 1fr; gap: 64px; }
  @media (max-width: 980px) { .layout { grid-template-columns: 1fr; } .cat-side { position: static !important; } }
  .cat-side { position: sticky; top: 96px; align-self: start; }
  .cat-list { list-style: none; }
  .cat-list li a {
    display: flex; justify-content: space-between; align-items: center;
    padding: 16px 0; border-bottom: 1px solid var(--line);
    font-size: 16px; font-weight: 500; color: var(--muted);
    transition: color .2s var(--t);
  }
  .cat-list li a:hover, .cat-list li a.active { color: var(--ink); }
  .cat-list li a .n { font-family: var(--font-mono); font-size: 11px; color: var(--muted); }
  .tab-row { display: flex; gap: 8px; margin-bottom: 32px; flex-wrap: wrap; }
  .tab {
    height: 38px; padding: 0 18px;
    border: 1px solid var(--line-2); border-radius: var(--r-pill);
    background: #fff; color: var(--ink-2);
    font-size: 13px; font-weight: 500;
    display: inline-flex; align-items: center; gap: 8px;
    cursor: pointer; transition: all .2s var(--t);
  }
  .tab .count { font-family: var(--font-mono); font-size: 10px; color: var(--muted); }
  .tab:hover { border-color: var(--ink); }
  .tab.active { background: var(--ink); color: #fff; border-color: var(--ink); }
  .tab.active .count { color: rgba(255,255,255,0.6); }
  .product-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px; }
  @media (max-width: 1100px) { .product-grid { grid-template-columns: repeat(2, 1fr); } }
  @media (max-width: 600px)  { .product-grid { grid-template-columns: 1fr; } }
  .pcard { background: var(--bg-2); border-radius: var(--r-lg); overflow: hidden;
    transition: transform .35s var(--t), box-shadow .35s var(--t), background .35s var(--t); cursor: pointer; }
  .pcard:hover { transform: translateY(-4px); background:#fff; box-shadow: 0 24px 48px -24px rgba(20,23,27,0.18); }
  .pcard .img {
    aspect-ratio: 1/1;
    background: radial-gradient(circle at 50% 38%, #fff 0%, #f0f2f5 70%, #e5e8ec 100%);
    position: relative; display: flex; align-items: center; justify-content: center;
  }
  .pcard .img svg { width: 65%; height: 65%; opacity: 0.85; }
  .pcard .img img { width: 90%; height: 90%; object-fit: contain; transition: transform .5s var(--t); }
  .pcard:hover .img img { transform: scale(1.04); }
  .pcard .code-tag {
    position: absolute; top: 14px; left: 14px;
    font-family: var(--font-mono); font-size: 10px; letter-spacing: 0.1em;
    color: var(--muted); text-transform: uppercase;
  }
  .pcard .info { padding: 18px 20px 22px; }
  .pcard .code { font-family: var(--font-mono); font-size: 11px; color: var(--muted); letter-spacing: 0.08em; }
  .pcard .name { font-size: 16px; font-weight: 600; margin-top: 4px; letter-spacing: -0.01em; }
  .pcard .dims { font-size: 12px; color: var(--muted); margin-top: 6px; font-variant-numeric: tabular-nums; }
</style>
</head>
<body>

<div id="shell-nav"></div>

<section class="subpage-hero">
  <div class="wrap">
    <div class="crumbs"><a href="/">Home</a><span class="sep">/</span><span>Products</span></div>
    <h1 id="catTitle">Products.</h1>
    <div class="sub" id="catSub"></div>
  </div>
</section>

<section class="section">
  <div class="wrap">
    <div class="layout">
      <aside class="cat-side">
        <ul class="cat-list" id="catList">
          <li><a data-cat="washbasin" href="?cat=washbasin">Washbasin <span class="n">60+</span></a></li>
          <li><a data-cat="pedestal" href="?cat=pedestal">Pedestal <span class="n">12</span></a></li>
          <li><a data-cat="standard" href="?cat=standard">Toilet <span class="n">15</span></a></li>
          <li><a data-cat="smart" href="?cat=smart">Smart Toilet <span class="n">06</span></a></li>
        </ul>
      </aside>
      <div>
        <div class="tab-row" id="tabRow"></div>
        <div class="product-grid" id="grid"></div>
      </div>
    </div>
  </div>
</section>

<div id="shell-footer"></div>

<script src="/assets/icons.js?v=6"></script>
<script src="/assets/site-shell.js?v=1"></script>
<script>
renderShell('products');
const ICONS = window.CHENGDA_ICONS || {};
const CATS = {
  washbasin: { title:'Washbasin.', sub:['60+ models','Above · Semi · Under','CUPC certified'], icon:'washbasin',
    tabs:[{id:'all',label:'All',count:18},{id:'above',label:'Above-counter',count:8},{id:'semi',label:'Semi-recessed',count:4},{id:'under',label:'Undercounter',count:6}],
    items:[{code:'A101',name:'Lumen Round',dims:'Ø410 × 145',sub:'above'},{code:'A108',name:'Volt Oval',dims:'600 × 380',sub:'above'},{code:'A115',name:'Mira Square',dims:'420 × 420',sub:'above'},{code:'A122',name:'Aria Vessel',dims:'Ø465 × 130',sub:'above'},{code:'A130',name:'Stone Counter',dims:'500 × 360',sub:'above'},{code:'A138',name:'Crest Boat',dims:'550 × 360',sub:'above'},{code:'A144',name:'Solis Round',dims:'Ø395 × 135',sub:'above'},{code:'A152',name:'Note Wide',dims:'700 × 380',sub:'above'},{code:'M201',name:'Calm Inset',dims:'560 × 410',sub:'semi'},{code:'M208',name:'Bay Inset',dims:'580 × 420',sub:'semi'},{code:'M214',name:'Riva Inset',dims:'600 × 430',sub:'semi'},{code:'M220',name:'Lina Inset',dims:'500 × 380',sub:'semi'},{code:'U301',name:'Vault Under',dims:'480 × 360',sub:'under'},{code:'U307',name:'Cove Under',dims:'500 × 380',sub:'under'},{code:'U312',name:'Quay Under',dims:'530 × 400',sub:'under'},{code:'U318',name:'Halo Under',dims:'Ø420',sub:'under'},{code:'U324',name:'Drift Under',dims:'480 × 340',sub:'under'},{code:'U330',name:'Plinth Under',dims:'520 × 380',sub:'under'}]},
  pedestal: { title:'Pedestal.', sub:['12 models','Floor & Wall-Hung'], icon:'pedestal',
    tabs:[{id:'all',label:'All',count:12},{id:'floor',label:'Floor',count:7},{id:'wall',label:'Wall-Hung',count:5}],
    items:[{code:'PB101',name:'Classic Pillar',dims:'560 × 460 × 850',sub:'floor'},{code:'PB108',name:'Slim Column',dims:'520 × 440 × 840',sub:'floor'},{code:'PB115',name:'Atelier',dims:'600 × 480 × 850',sub:'floor'},{code:'PB122',name:'Forma',dims:'550 × 450 × 845',sub:'floor'},{code:'PB130',name:'Lirio',dims:'580 × 460 × 850',sub:'floor'},{code:'PB144',name:'Toro',dims:'610 × 470 × 855',sub:'floor'},{code:'PB158',name:'Mira Column',dims:'590 × 460 × 850',sub:'floor'},{code:'WB101',name:'Float Wall',dims:'500 × 420',sub:'wall'},{code:'WB103',name:'Linea Wall',dims:'550 × 440',sub:'wall'},{code:'WB105',name:'Plate Wall',dims:'600 × 460',sub:'wall'},{code:'WB107',name:'Edge Wall',dims:'480 × 380',sub:'wall'},{code:'WB108',name:'Crest Wall',dims:'520 × 400',sub:'wall'}]},
  standard: { title:'Toilet.', sub:['15 models · One-piece','Floor-mount · Dual flush','Antibacterial glaze · Soft-close seat'], icon:'toilet',
    tabs:[{id:'all',label:'All',count:15},{id:'open',label:'Open tank',count:12},{id:'concealed',label:'Concealed cistern',count:3}],
    items:[{code:"T201",name:"T201 · Cascade siphon · curved one-piece",dims:"690 × 375 × 660 mm",sub:"open",img:'/assets/products/' + "T201" + '/card.webp'},{code:"T202",name:"T202 · Cascade vortex · narrow footprint",dims:"680 × 360 × 700 mm",sub:"open",img:'/assets/products/' + "T202" + '/card.webp'},{code:"T203",name:"T203 · Rimless · fully glazed bowl",dims:"660 × 370 × 700 mm",sub:"open",img:'/assets/products/' + "T203" + '/card.webp'},{code:"T204",name:"T204 · Concealed cistern · 650 mm low silhouette",dims:"700 × 365 × 650 mm",sub:"concealed",img:'/assets/products/' + "T204" + '/card.webp'},{code:"T205",name:"T205 · Concealed cistern · soft-shoulder body",dims:"700 × 365 × 650 mm",sub:"concealed",img:'/assets/products/' + "T205" + '/card.webp'},{code:"T206",name:"T206 · Concealed cistern · squared shoulder",dims:"680 × 370 × 700 mm",sub:"concealed",img:'/assets/products/' + "T206" + '/card.webp'},{code:"T207",name:"T207 · Sculpted body · 430 mm seat width",dims:"680 × 430 × 680 mm",sub:"open",img:'/assets/products/' + "T207" + '/card.webp'},{code:"T208",name:"T208 · Soft-square one-piece",dims:"700 × 370 × 720 mm",sub:"open",img:'/assets/products/' + "T208" + '/card.webp'},{code:"T209",name:"T209 · Tall tank · super siphon",dims:"680 × 365 × 750 mm",sub:"open",img:'/assets/products/' + "T209" + '/card.webp'},{code:"T210",name:"T210 · Wide stance · 380 mm seat height",dims:"700 × 395 × 710 mm",sub:"open",img:'/assets/products/' + "T210" + '/card.webp'},{code:"T211",name:"T211 · Tall tank · soft cylinder",dims:"680 × 365 × 750 mm",sub:"open",img:'/assets/products/' + "T211" + '/card.webp'},{code:"T212",name:"T212 · Tall tank · squared shoulder",dims:"680 × 365 × 750 mm",sub:"open",img:'/assets/products/' + "T212" + '/card.webp'},{code:"T213",name:"T213 · Tall tank · slim profile",dims:"680 × 365 × 750 mm",sub:"open",img:'/assets/products/' + "T213" + '/card.webp'},{code:"T214",name:"T214 · Tall tank · architectural",dims:"680 × 365 × 750 mm",sub:"open",img:'/assets/products/' + "T214" + '/card.webp'},{code:"T215",name:"T215 · Flagship 760 mm tank",dims:"680 × 365 × 760 mm",sub:"open",img:'/assets/products/' + "T215" + '/card.webp'}]},
  smart: { title:'Smart Toilet.', sub:['New series','Heated seat · Auto flush'], icon:'smarttoilet',
    tabs:[{id:'all',label:'All',count:6},{id:'floor',label:'Floor',count:3},{id:'wall',label:'Wall-Hung',count:3}],
    items:[{code:'ST101',name:'Lumen Smart',dims:'720 × 400 × 480',sub:'floor'},{code:'ST108',name:'Volt Smart',dims:'700 × 390 × 470',sub:'floor'},{code:'ST115',name:'Aria Smart',dims:'710 × 395 × 475',sub:'floor'},{code:'SW201',name:'Float Smart',dims:'540 × 360 × 320',sub:'wall'},{code:'SW208',name:'Edge Smart',dims:'560 × 370 × 330',sub:'wall'},{code:'SW214',name:'Plate Smart',dims:'550 × 365 × 325',sub:'wall'}]},
};
const params = new URLSearchParams(location.search);
let cat = params.get('cat') || 'washbasin'; if (!CATS[cat]) cat='washbasin';
let sub = params.get('sub') || 'all';
const C = CATS[cat];
document.getElementById('catTitle').textContent = C.title;
document.getElementById('catSub').innerHTML = C.sub.map(s=>`<span>${s}</span>`).join('');
document.querySelectorAll('#catList a').forEach(a=>a.classList.toggle('active', a.dataset.cat===cat));
const tabRow = document.getElementById('tabRow');
tabRow.innerHTML = C.tabs.map(t=>`<button class="tab ${t.id===sub?'active':''}" data-sub="${t.id}">${t.label} <span class="count">${String(t.count).padStart(2,'0')}</span></button>`).join('');
const grid = document.getElementById('grid');
function render() {
  const items = sub==='all' ? C.items : C.items.filter(i=>i.sub===sub);
  grid.innerHTML = items.map(it=>{
    const href = it.img && cat==='standard' ? `/products/${it.code}/` : '#';
    const visual = it.img
      ? `<img src="${it.img}" alt="${it.code}" loading="lazy" decoding="async" />`
      : (ICONS[C.icon]||'');
    return `
    <a class="pcard" href="${href}">
      <div class="img"><span class="code-tag">${it.code}</span>${visual}</div>
      <div class="info"><div class="code">${it.code}</div><div class="name">${it.name}</div><div class="dims">${it.dims}</div></div>
    </a>`;
  }).join('');
}
render();
tabRow.addEventListener('click', e=>{
  const b = e.target.closest('.tab'); if(!b) return;
  sub = b.dataset.sub;
  document.querySelectorAll('.tab').forEach(t=>t.classList.toggle('active', t===b));
  render();
  const u=new URL(location.href); u.searchParams.set('sub',sub); history.replaceState(null,'',u);
});
</script>
</body>
</html>
