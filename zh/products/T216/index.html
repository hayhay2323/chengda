  <script>
  (function(){
    const root = document.getElementById('gallery'); if (!root) return;
    const items = root.querySelectorAll('.gi');
    const io = new IntersectionObserver((entries) => {
      entries.forEach(e => { if (e.isIntersecting) { e.target.classList.add('in'); io.unobserve(e.target); } });
    }, { root, rootMargin: '0px 80px 0px 80px', threshold: 0.15 });
    items.forEach(i => io.observe(i));

    const track = document.getElementById('gscroll');
    const thumb = document.getElementById('gthumb');
    const maxScroll = () => root.scrollWidth - root.clientWidth;
    const trackW = () => track.clientWidth;
    const thumbW = () => Math.max(36, Math.round(trackW() * (root.clientWidth / root.scrollWidth)));

    let raf = null, twCache = thumbW();
    function sync(){
      raf = null;
      twCache = thumbW();
      thumb.style.width = twCache + 'px';
      const m = maxScroll();
      const p = m > 0 ? (root.scrollLeft / m) * (trackW() - twCache) : 0;
      thumb.style.transform = `translateX(${p}px)`;
    }
    function queueSync(){ if (raf == null) raf = requestAnimationFrame(sync); }
    root.addEventListener('scroll', queueSync, { passive: true });
    window.addEventListener('resize', queueSync);
    sync();

    // Drag the thumb
    let tDrag = false, tStartX = 0, tStartLeft = 0;
    thumb.addEventListener('pointerdown', (e) => {
      e.preventDefault();
      tDrag = true; thumb.classList.add('drag');
      tStartX = e.clientX;
      const m = maxScroll();
      tStartLeft = m > 0 ? (root.scrollLeft / m) * (trackW() - twCache) : 0;
      thumb.setPointerCapture(e.pointerId);
    });
    thumb.addEventListener('pointermove', (e) => {
      if (!tDrag) return;
      const room = trackW() - twCache;
      const newLeft = Math.max(0, Math.min(room, tStartLeft + (e.clientX - tStartX)));
      root.scrollLeft = room > 0 ? (newLeft / room) * maxScroll() : 0;
    });
    const tEnd = (e) => {
      if (!tDrag) return;
      tDrag = false; thumb.classList.remove('drag');
      try { thumb.releasePointerCapture(e.pointerId); } catch(_) {}
    };
    thumb.addEventListener('pointerup', tEnd);
    thumb.addEventListener('pointercancel', tEnd);

    // Click the track to jump (smooth)
    track.addEventListener('click', (e) => {
      if (e.target === thumb) return;
      const rect = track.getBoundingClientRect();
      const tw = twCache;
      const room = trackW() - tw;
      const x = Math.max(0, Math.min(room, e.clientX - rect.left - tw / 2));
      root.scrollTo({ left: room > 0 ? (x / room) * maxScroll() : 0, behavior: 'smooth' });
    });

    // Grab + drag anywhere on the gallery
    let gDrag = false, gStartX = 0, gStartLeft = 0, gMoved = 0;
    root.addEventListener('pointerdown', (e) => {
      if (e.pointerType === 'touch') return; // let native touch handle
      gDrag = true; gMoved = 0;
      gStartX = e.clientX; gStartLeft = root.scrollLeft;
      root.classList.add('dragging');
      root.setPointerCapture(e.pointerId);
    });
    root.addEventListener('pointermove', (e) => {
      if (!gDrag) return;
      const dx = e.clientX - gStartX;
      gMoved = Math.max(gMoved, Math.abs(dx));
      root.scrollLeft = gStartLeft - dx;
    });
    const gEnd = (e) => {
      if (!gDrag) return;
      gDrag = false;
      root.classList.remove('dragging');
      try { root.releasePointerCapture(e.pointerId); } catch(_) {}
    };
    root.addEventListener('pointerup', gEnd);
    root.addEventListener('pointercancel', gEnd);
    // Prevent stray clicks after a drag (e.g. so dragging doesn't open an image)
    root.addEventListener('click', (e) => { if (gMoved > 6) { e.preventDefault(); e.stopPropagation(); } }, true);

    // Redirect vertical mouse wheel to horizontal scroll within the gallery
    root.addEventListener('wheel', (e) => {
      if (Math.abs(e.deltaY) > Math.abs(e.deltaX) && Math.abs(e.deltaY) > 0) {
        e.preventDefault();
        root.scrollLeft += e.deltaY;
      }
    }, { passive: false });
  })();
  </script>
