<script>
  document.addEventListener('DOMContentLoaded', function () {
    renderShell('videos');
    var lb = document.createElement('div');
    lb.className = 'v-lightbox';
    lb.innerHTML = '<button class="v-lightbox-close" type="button" aria-label="關閉">✕</button>';
    document.body.appendChild(lb);
    function close() {
      lb.classList.remove('open');
      var v = lb.querySelector('video');
      if (v) { v.pause(); v.remove(); }
      document.documentElement.style.overflow = '';
    }
    lb.querySelector('.v-lightbox-close').addEventListener('click', close);
    lb.addEventListener('click', function (e) { if (e.target === lb) close(); });
    document.addEventListener('keydown', function (e) { if (e.key === 'Escape') close(); });
    document.querySelectorAll('.v-card').forEach(function (card) {
      var src = card.getAttribute('data-src');
      var frame = card.querySelector('.v-frame');
      if (!src || !frame) return;
      frame.addEventListener('click', function () {
        var v = document.createElement('video');
        v.src = src; v.controls = true; v.autoplay = true; v.playsInline = true;
        v.setAttribute('playsinline', '');
        v.setAttribute('controlsList', 'nofullscreen');
        v.setAttribute('preload', 'metadata');
        lb.appendChild(v);
        lb.classList.add('open');
        document.documentElement.style.overflow = 'hidden';
      });
    });
  });
</script>
