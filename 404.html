<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>404 · Chengda</title>
<meta name="viewport" content="width=device-width, initial-scale=1" />
<link rel="icon" type="image/svg+xml" href="/favicon.svg">
<link rel="icon" type="image/x-icon" href="/favicon.ico" />
<link rel="icon" type="image/png" sizes="32x32" href="/favicon-32.png" />
<link rel="icon" type="image/png" sizes="16x16" href="/favicon-16.png" />
<link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
<meta name="theme-color" content="#14171B" />
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/assets/porcelain.css?v=6" />
<style>
  body { display: flex; align-items: center; justify-content: center; min-height: 100vh; }
  .err {
    text-align: center;
    padding: 64px var(--pad);
    max-width: 560px;
  }
  .err .code {
    font-family: var(--font-mono);
    font-size: 11px;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 28px;
  }
  .err h1 {
    font-size: clamp(72px, 12vw, 168px);
    font-weight: 500;
    letter-spacing: -0.05em;
    line-height: 0.95;
    margin-bottom: 24px;
  }
  .err h1 .soft {
    color: var(--muted);
    font-style: italic;
    font-weight: 400;
  }
  .err p {
    font-size: 17px;
    color: var(--ink-2);
    line-height: 1.55;
    margin-bottom: 36px;
    max-width: 38ch;
    margin-left: auto;
    margin-right: auto;
  }
</style>
</head>
<body>
  <main class="err">
    <div class="code">Error · 404</div>
    <h1>Page <span class="soft">not found.</span></h1>
    <p>The page you're looking for doesn't exist or has been moved.</p>
    <a href="/" class="btn primary"><span>Back to home</span><span class="arr"></span></a>
  </main>
</body>
</html>
